<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Varun - Resume</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2300adb5' width='100' height='100'/><text x='50' y='65' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>V</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        html {
            font-size: 16px;
        }

        :root {
            --bg-primary: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-primary: #00adb5;
            --accent-secondary: #00d9cc;
            --navbar-bg: rgba(17, 17, 17, 0.95);
        }

        :root[data-theme="light"] {
            --bg-primary: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        /* PDF Viewer (Left Side) */
        .pdf-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .pdf-controls {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .download-btn {
            background: linear-gradient(135deg, #00adb5 0%, #00d9cc 100%);
            color: #0f0f0f;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 173, 181, 0.5);
        }

        .pdf-viewer {
            flex: 1;
            border-radius: 12px;
            border: 1px solid rgba(0, 173, 181, 0.2);
            overflow: hidden;
            background: rgba(26, 26, 46, 0.6);
        }

        .pdf-viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Right Sidebar Navigation */
        .sidebar-nav {
            width: 280px;
            background: var(--navbar-bg);
            padding: 2rem 0;
            border-left: 1px solid rgba(0, 173, 181, 0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-nav-title {
            padding: 0 1.5rem;
            margin-bottom: 2rem;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00adb5 0%, #00d9cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links-section {
            display: flex;
            flex-direction: column;
        }

        .nav-section-label {
            padding: 0.75rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1.5rem;
        }

        .nav-links-section a {
            padding: 0.75rem 1.5rem;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
        }

        .nav-links-section a:hover {
            color: #00adb5;
            border-left-color: #00adb5;
            padding-left: 2rem;
            background: rgba(0, 173, 181, 0.1);
        }

        .nav-links-section a::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #00adb5;
            border-radius: 50%;
            margin-right: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-links-section a:hover::before {
            opacity: 1;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .sidebar-nav {
                width: 200px;
                padding: 1.5rem 0;
            }

            .pdf-container {
                padding: 1.5rem;
            }

            .nav-links-section a {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            .sidebar-nav-title {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .pdf-container {
                padding: 1rem;
            }

            .sidebar-nav {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(0, 173, 181, 0.2);
                height: auto;
                padding: 1rem 0;
            }

            .nav-links-section {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .nav-section-label {
                display: none;
            }

            .nav-links-section a {
                flex: 0 1 auto;
                padding: 0.5rem 1rem;
                border-left: none;
                border-bottom: 2px solid transparent;
            }

            .nav-links-section a:hover {
                border-left: none;
                border-bottom-color: #00adb5;
                padding-left: 1rem;
            }

            .nav-links-section a::before {
                display: none;
            }
        }

        /* Scrollbar Styling */
        .sidebar-nav::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-nav::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-nav::-webkit-scrollbar-thumb {
            background: rgba(0, 173, 181, 0.3);
            border-radius: 3px;
        }

        .sidebar-nav::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 173, 181, 0.5);
        }

        /* Dark Mode Toggle in Sidebar */
        .theme-toggle-sidebar {
            background: rgba(0, 173, 181, 0.1);
            border: 1px solid rgba(0, 173, 181, 0.3);
            color: #00adb5;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            margin: 1.5rem;
            border: none;
            background: transparent;
            width: calc(100% - 3rem);
        }

        .theme-toggle-sidebar:hover {
            background: rgba(0, 173, 181, 0.2);
            border-color: #00adb5;
            box-shadow: 0 0 15px rgba(0, 173, 181, 0.3);
        }
    </style>
</head>
<body>

    <!-- PDF Viewer (Left Side) -->
    <div class="pdf-container">
        <div class="pdf-controls">
            <h2 style="color: #00adb5; flex: 1;">My Resume</h2>
            <a href="resume.pdf" download class="download-btn">⬇️ Download PDF</a>
        </div>
        <div class="pdf-viewer">
            <iframe src="resume.pdf#toolbar=0" title="Resume PDF"></iframe>
        </div>
    </div>

    <!-- Right Sidebar Navigation -->
    <nav class="sidebar-nav">
        <div class="sidebar-nav-title">Varun</div>

        <div class="nav-section-label">Portfolio</div>
        <div class="nav-links-section">
            <a href="index.html">← Back to Portfolio</a>
        </div>

        <div class="nav-section-label">Navigation</div>
        <div class="nav-links-section">
            <a href="index.html#about">About</a>
            <a href="index.html#skills">Skills</a>
            <a href="index.html#projects">Projects</a>
            <a href="index.html#certificates">Certificates</a>
            <a href="index.html#contact">Contact</a>
        </div>

        <div class="nav-section-label">Resume</div>
        <div class="nav-links-section">
            <a href="resume.pdf" download>⬇️ Download</a>
            <a href="#" onclick="document.querySelector('iframe').focus();">View Full</a>
        </div>

        <button class="theme-toggle-sidebar" title="Toggle Dark/Light Mode" onclick="toggleTheme()">🌙</button>
    </nav>

    <script>
        // Dark Mode Toggle
        const htmlElement = document.documentElement;

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateThemeToggle(savedTheme);

        function toggleTheme() {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeToggle(newTheme);
        }

        function updateThemeToggle(theme) {
            const toggleBtn = document.querySelector('.theme-toggle-sidebar');
            if (toggleBtn) {
                toggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
            }
        }
    </script>

</body>
</html>
